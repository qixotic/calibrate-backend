version: '3.8'

services:
  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${PORT}:8000"
    environment:
      - DOCS_USERNAME=${DOCS_USERNAME:-admin}
      - DOCS_PASSWORD=${DOCS_PASSWORD:-changeme}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-1}
      - MAX_CONCURRENT_JOBS_PER_ORG=${MAX_CONCURRENT_JOBS_PER_ORG:-1}
      - DEFAULT_MAX_ROWS_PER_EVAL=${DEFAULT_MAX_ROWS_PER_EVAL:-20}
      - CALIBRATE_TEST_PARALLEL=${CALIBRATE_TEST_PARALLEL:-}
      - CALIBRATE_SIMULATION_PARALLEL=${CALIBRATE_SIMULATION_PARALLEL:-}
      - SUPERADMIN_EMAIL=${SUPERADMIN_EMAIL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-168}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - SMALLEST_API_KEY=${SMALLEST_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_ALLOWED_PROVIDERS=${OPENROUTER_ALLOWED_PROVIDERS}
      - PROVIDER_STATUS_REFRESH_INTERVAL_SECONDS=${PROVIDER_STATUS_REFRESH_INTERVAL_SECONDS:-300}
      - PROVIDER_STATUS_CACHE_MAX_AGE_SECONDS=${PROVIDER_STATUS_CACHE_MAX_AGE_SECONDS:-900}
      - PROVIDER_STATUS_CHECK_TIMEOUT_SECONDS=${PROVIDER_STATUS_CHECK_TIMEOUT_SECONDS:-120}
      - OBJECT_STORAGE_MODE=${OBJECT_STORAGE_MODE:-s3}
      - S3_OUTPUT_BUCKET=${S3_OUTPUT_BUCKET}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}
      - DB_ROOT_DIR=${DB_ROOT_DIR}
      - DEFAULT_USER_EMAIL=${DEFAULT_USER_EMAIL}
      - DEFAULT_USER_FIRST_NAME=${DEFAULT_USER_FIRST_NAME:-Admin}
      - DEFAULT_USER_LAST_NAME=${DEFAULT_USER_LAST_NAME:-User}
      - DEFAULT_AGENT_SYSTEM_PROMPT=${DEFAULT_AGENT_SYSTEM_PROMPT:-}
      - DEFAULT_AGENT_LLM_MODEL=${DEFAULT_AGENT_LLM_MODEL:-}
      - DEFAULT_AGENT_STT_PROVIDER=${DEFAULT_AGENT_STT_PROVIDER:-}
      - DEFAULT_AGENT_TTS_PROVIDER=${DEFAULT_AGENT_TTS_PROVIDER:-}
      - DEFAULT_AGENT_SPEAKS_FIRST=${DEFAULT_AGENT_SPEAKS_FIRST:-}
      - DEFAULT_AGENT_MAX_TURNS=${DEFAULT_AGENT_MAX_TURNS:-}
      - DEFAULT_PERSONA_GENDER=${DEFAULT_PERSONA_GENDER:-}
      - DEFAULT_PERSONA_LANGUAGE=${DEFAULT_PERSONA_LANGUAGE:-}
      - DEFAULT_PERSONA_INTERRUPTION_SENSITIVITY=${DEFAULT_PERSONA_INTERRUPTION_SENSITIVITY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-1.0}
      - SENTRY_PROFILES_SAMPLE_RATE=${SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      - ENVIRONMENT=${ENVIRONMENT}
      - ENABLE_TRACING=${ENABLE_TRACING}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS}
      - LANGFUSE_TRACING_ENVIRONMENT=${LANGFUSE_TRACING_ENVIRONMENT}
      - LANGFUSE_HOST=${LANGFUSE_HOST}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
    volumes:
      - ${APP_FOLDER_PATH}:/appdata
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
