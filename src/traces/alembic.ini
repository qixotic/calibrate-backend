# Alembic CLI config for the traces store, used only for authoring migrations:
#
#   uv run alembic -c src/traces/alembic.ini revision --autogenerate -m "..."
#
# Runtime upgrades don't read this file — main.py calls
# traces.migrate.run_traces_migrations() at startup. The DSN comes from
# TRACES_DATABASE_URL (see traces/engine.py); never point this at pense.db.

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s/..
