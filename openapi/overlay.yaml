# Speakeasy overlay: clean CLI method names for each Public API route.
# Wired in .speakeasy/workflow.yaml. KEEP IN SYNC with routes tagged
# `Public API` in main.py. Enforced by tests/test_sdk_overrides.py.

overlay: 1.0.0
info:
  title: Calibrate public API client naming
  version: 0.0.1
actions:
  - target: $.paths['/agents'].get
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: list
      x-speakeasy-mcp:
        name: list-agents
        title: List agents
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List every agent in the caller's organization. Returns each agent's
          UUID, name, type, and config. Use this to discover which agents exist
          before resolving names or launching test runs. Requires a Calibrate
          API key (CALIBRATE_API_KEY).
  - target: $.paths['/agents/resolve'].post
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: resolve
      x-speakeasy-mcp:
        name: resolve-agent-names
        title: Resolve agent names to UUIDs
        scopes: [read]
        readOnlyHint: true
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
        description: |
          Map human-friendly agent names to UUIDs within the caller's org. Each
          name resolves to at most one agent; unknown names are returned under
          not_found. Use this before run-agent-tests when you have names instead
          of UUIDs. Does not create or modify agents.
  - target: $.paths['/agent-tests/agent/{agent_uuid}/run'].post
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: run
      x-speakeasy-mcp:
        name: run-agent-tests
        title: Run agent tests
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
        description: |
          Start a background LLM unit-test job for one agent. Runs all tests
          linked to the agent unless test_uuids is provided. Returns a task_id
          to poll with get-agent-test-run. The agent must belong to the caller's
          org and have a verified connection; otherwise the call fails with 400
          or 404.
  - target: $.paths['/agent-tests/run'].post
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: run_batch
      x-speakeasy-mcp:
        name: run-agent-tests-batch
        title: Run agent tests (batch)
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
        description: |
          Launch one test job per agent in the caller's org. Optionally restrict
          to agent_names; omit or pass an empty list to run every org agent.
          Agents with no linked tests or an unverified connection are skipped
          (reported under skipped) rather than failing the batch. Returns
          task_id values to poll with get-agent-test-run.
  - target: $.paths['/agent-tests/run/{task_id}'].get
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: get_run
      x-speakeasy-mcp:
        name: get-agent-test-run
        title: Get agent test run status
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Poll the status and results of an agent test run by task_id. Returns
          queued, in_progress, completed, failed, or aborted status. When
          completed, includes per-test-case pass/fail results and evaluator
          judgments. Use the task_id from run-agent-tests or
          run-agent-tests-batch.
  - target: $.paths['/agents'].post
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: create
      x-speakeasy-mcp:
        name: create-agent
        title: Create agent
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
        description: |
          Create a new agent in the caller's organization. Provide the agent's
          name, type, and config. Returns the created agent including its UUID.
          Requires a Calibrate API key (CALIBRATE_API_KEY).
  - target: $.paths['/agents/{agent_uuid}'].get
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: get
      x-speakeasy-mcp:
        name: get-agent
        title: Get agent
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Fetch a single agent by UUID within the caller's org. Returns the
          agent's name, type, and config. Fails with 404 if the agent does not
          exist or belongs to another org.
  - target: $.paths['/agents/{agent_uuid}'].put
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: update
      x-speakeasy-mcp:
        name: update-agent
        title: Update agent
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
        description: |
          Update an existing agent by UUID within the caller's org. Supply the
          fields to change (name, type, config). Returns the updated agent.
          Fails with 404 if the agent does not exist or belongs to another org.
  - target: $.paths['/agents/{agent_uuid}/evaluators'].get
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: list_evaluators
      x-speakeasy-mcp:
        name: list-agent-evaluators
        title: List evaluators linked to an agent
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List the evaluators linked to an agent, most recently linked first.
          Returns each evaluator's UUID, name, type, and live version summary.
  - target: $.paths['/agents/{agent_uuid}/evaluators'].post
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: link_evaluators
      x-speakeasy-mcp:
        name: link-evaluators-to-agent
        title: Link evaluators to an agent
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
        description: |
          Link one or more evaluators to an agent, skipping any already linked.
          Each evaluator must be one you created or a built-in default, and the
          agent must be in your workspace.
  - target: $.paths['/tests'].post
    update:
      x-speakeasy-group: tests
      x-speakeasy-name-override: create
      x-speakeasy-mcp:
        name: create-test
        title: Create test
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
        description: |
          Create a new test in the caller's organization. Provide the test's
          name, type, and config. Returns the created test including its UUID.
          Requires a Calibrate API key (CALIBRATE_API_KEY).
  - target: $.paths['/tests'].get
    update:
      x-speakeasy-group: tests
      x-speakeasy-name-override: list
      x-speakeasy-mcp:
        name: list-tests
        title: List tests
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List every test in the caller's organization. Returns each test's
          UUID, name, type, and config. Use this to discover which tests exist
          before creating runs.
  - target: $.paths['/tests/bulk'].post
    update:
      x-speakeasy-group: tests
      x-speakeasy-name-override: bulk_create
      x-speakeasy-mcp:
        name: bulk-create-tests
        title: Create tests (bulk)
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: false
        openWorldHint: true
        description: |
          Create multiple tests in the caller's organization in one call. Provide
          a list of test definitions (name, type, config). Returns the created
          tests including their UUIDs.
  - target: $.paths['/tests/{test_uuid}'].get
    update:
      x-speakeasy-group: tests
      x-speakeasy-name-override: get
      x-speakeasy-mcp:
        name: get-test
        title: Get test
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Fetch a single test by UUID within the caller's org. Returns the
          test's name, type, and config. Fails with 404 if the test does not
          exist or belongs to another org.
  - target: $.paths['/tests/{test_uuid}'].put
    update:
      x-speakeasy-group: tests
      x-speakeasy-name-override: update
      x-speakeasy-mcp:
        name: update-test
        title: Update test
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        idempotentHint: true
        openWorldHint: true
        description: |
          Update an existing test by UUID within the caller's org. Supply the
          fields to change (name, config). Returns the updated test. Fails with
          404 if the test does not exist or belongs to another org.

  - target: $.paths['/agents/{agent_uuid}/verify-connection'].post
    update:
      x-speakeasy-group: agents
      x-speakeasy-name-override: verify_connection
      x-speakeasy-mcp:
        name: verify-agent-connection
        title: Verify agent connection
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Verify that a connection-type agent responds. Optionally pass a model to verify it before benchmarking. The endpoint and headers come from the agent's stored config; a successful check is recorded on the agent.
  - target: $.paths['/agent-tests'].post
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: link
      x-speakeasy-mcp:
        name: link-tests-to-agent
        title: Link tests to agent
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: true
        description: |
          Link one or more existing tests to an agent so they run together. Tests already linked are skipped. The agent and every test must be in your workspace.
  - target: $.paths['/agent-tests/agent/{agent_uuid}/tests'].get
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: list_for_agent
      x-speakeasy-mcp:
        name: list-agent-tests
        title: List tests for an agent
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List the tests linked to an agent.
  - target: $.paths['/agent-tests/agent/{agent_uuid}/runs'].get
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: list_runs_for_agent
      x-speakeasy-mcp:
        name: list-agent-test-runs
        title: List test runs for an agent
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List an agent's test and benchmark runs, most recently created first, with their status and results.
  - target: $.paths['/agent-tests/agent/{agent_uuid}/benchmark'].post
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: benchmark
      x-speakeasy-mcp:
        name: run-agent-benchmark
        title: Run agent benchmark
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Start a multi-model benchmark over an agent's linked tests as a background job. Optionally restrict to a subset of linked tests. Returns a task_id to poll with get-agent-benchmark.
  - target: $.paths['/agent-tests/benchmark/{task_id}'].get
    update:
      x-speakeasy-group: agent_tests
      x-speakeasy-name-override: get_benchmark
      x-speakeasy-mcp:
        name: get-agent-benchmark
        title: Get benchmark status
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Get the results of a benchmark run, including per-model scores and the leaderboard.
  - target: $.paths['/evaluators'].post
    update:
      x-speakeasy-group: evaluators
      x-speakeasy-name-override: create
      x-speakeasy-mcp:
        name: create-evaluator
        title: Create evaluator
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Create an evaluator and its first version, which is set live. An evaluator judges an output against a prompt and rubric.
  - target: $.paths['/evaluators'].get
    update:
      x-speakeasy-group: evaluators
      x-speakeasy-name-override: list
      x-speakeasy-mcp:
        name: list-evaluators
        title: List evaluators
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List your evaluators. Optionally filter by what they judge or their modality, and include the built-in defaults.
  - target: $.paths['/evaluators/{evaluator_uuid}'].get
    update:
      x-speakeasy-group: evaluators
      x-speakeasy-name-override: get
      x-speakeasy-mcp:
        name: get-evaluator
        title: Get evaluator
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Get one evaluator with its full version history.
  - target: $.paths['/evaluators/{evaluator_uuid}/versions'].post
    update:
      x-speakeasy-group: evaluators
      x-speakeasy-name-override: create_version
      x-speakeasy-mcp:
        name: create-evaluator-version
        title: Create evaluator version
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Add a new version to an evaluator you created, optionally making it live. The variable names must match the previous version.
  - target: $.paths['/annotation-tasks'].post
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: create
      x-speakeasy-mcp:
        name: create-annotation-task
        title: Create annotation task
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Create an annotation task for labelling items against evaluators. Optionally link evaluators in order.
  - target: $.paths['/annotation-tasks'].get
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: list
      x-speakeasy-mcp:
        name: list-annotation-tasks
        title: List annotation tasks
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          List your annotation tasks with their linked evaluators.
  - target: $.paths['/annotation-tasks/{task_uuid}'].get
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: get
      x-speakeasy-mcp:
        name: get-annotation-task
        title: Get annotation task
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Get one annotation task with its evaluators, items, and labelling jobs.
  - target: $.paths['/annotation-tasks/{task_uuid}/evaluators'].put
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: set_evaluators
      x-speakeasy-mcp:
        name: set-task-evaluators
        title: Set an annotation task's evaluators
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: true
        description: |
          Replace the task's linked evaluators with exactly the given ordered
          set: new ids are linked, omitted ids are unlinked, and the list order
          sets their display position. Send an empty list to unlink all. Each
          evaluator must be one you created or a built-in default, and the task
          must be in your workspace.
  - target: $.paths['/annotation-tasks/{task_uuid}/items'].post
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: add_items
      x-speakeasy-mcp:
        name: add-annotation-items
        title: Bulk create items
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Bulk-create items in an annotation task, optionally seeding human annotations.
  - target: $.paths['/annotation-tasks/{task_uuid}/items'].put
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: update_items
      x-speakeasy-mcp:
        name: update-annotation-items
        title: Bulk update items
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: true
        description: |
          Bulk-update item payloads in an annotation task.
  - target: $.paths['/annotation-tasks/{task_uuid}/evaluator-runs'].post
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: create_evaluator_run
      x-speakeasy-mcp:
        name: run-annotation-evaluators
        title: Run evaluators on items
        scopes: [write]
        readOnlyHint: false
        destructiveHint: false
        openWorldHint: true
        idempotentHint: false
        description: |
          Run one or more of a task's evaluators over its items as a background job. Returns a job_uuid to poll with get-annotation-evaluator-run.
  - target: $.paths['/annotation-tasks/{task_uuid}/evaluator-runs/{job_uuid}'].get
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: get_evaluator_run
      x-speakeasy-mcp:
        name: get-annotation-evaluator-run
        title: Get evaluator run
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Get one evaluator-run job with its results and human-agreement summary.
  - target: $.paths['/annotation-tasks/{task_uuid}/agreement'].get
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: get_agreement
      x-speakeasy-mcp:
        name: get-annotation-agreement
        title: Get task agreement
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Get human-vs-human and human-vs-evaluator agreement metrics for a task, with a trend series.
  - target: $.paths['/annotation-tasks/{task_uuid}/summary'].get
    update:
      x-speakeasy-group: annotation_tasks
      x-speakeasy-name-override: get_summary
      x-speakeasy-mcp:
        name: get-annotation-summary
        title: Get task summary
        scopes: [read]
        readOnlyHint: true
        openWorldHint: true
        description: |
          Get a paginated summary table for a task, with each item's evaluator values and human labels.
