# Fern layers these on top of the fetched OpenAPI spec (wired in generators.yml).
# Sole purpose: give each PUBLIC endpoint a clean SDK method name, i.e.
# client.<group>.<method>(...). Without an entry, Fern falls back to an ugly
# name derived from FastAPI's operationId.
#
# KEEP THIS IN SYNC WITH THE PUBLIC API. This list must mirror the routes tagged
# `Public API` (the ones in `_build_public_openapi()`). Add/remove a public
# endpoint -> add/remove its entry here. Enforced by tests/test_sdk_overrides.py
# (fails CI if this doesn't name exactly the public routes).

paths:
  /agents:
    get:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: list
    post:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: create
  /agents/resolve:
    post:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: resolve
  /agents/{agent_uuid}:
    get:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: get
    put:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: update
  /agents/{agent_uuid}/verify-connection:
    post:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: verify_connection
  /agents/{agent_uuid}/evaluators:
    get:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: list_evaluators
    post:
      x-fern-sdk-group-name: agents
      x-fern-sdk-method-name: link_evaluators
  /tests:
    post:
      x-fern-sdk-group-name: tests
      x-fern-sdk-method-name: create
    get:
      x-fern-sdk-group-name: tests
      x-fern-sdk-method-name: list
  /tests/bulk:
    post:
      x-fern-sdk-group-name: tests
      x-fern-sdk-method-name: bulk_create
  /tests/{test_uuid}:
    get:
      x-fern-sdk-group-name: tests
      x-fern-sdk-method-name: get
    put:
      x-fern-sdk-group-name: tests
      x-fern-sdk-method-name: update
  /agent-tests:
    post:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: link
  /agent-tests/agent/{agent_uuid}/tests:
    get:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: list_for_agent
  /agent-tests/agent/{agent_uuid}/runs:
    get:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: list_runs_for_agent
  /agent-tests/agent/{agent_uuid}/run:
    post:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: run
  /agent-tests/run:
    post:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: run_batch
  /agent-tests/run/{task_id}:
    get:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: get_run
  /agent-tests/agent/{agent_uuid}/benchmark:
    post:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: benchmark
  /agent-tests/benchmark/{task_id}:
    get:
      x-fern-sdk-group-name: agent_tests
      x-fern-sdk-method-name: get_benchmark
  /evaluators:
    post:
      x-fern-sdk-group-name: evaluators
      x-fern-sdk-method-name: create
    get:
      x-fern-sdk-group-name: evaluators
      x-fern-sdk-method-name: list
  /evaluators/{evaluator_uuid}:
    get:
      x-fern-sdk-group-name: evaluators
      x-fern-sdk-method-name: get
  /evaluators/{evaluator_uuid}/versions:
    post:
      x-fern-sdk-group-name: evaluators
      x-fern-sdk-method-name: create_version
  /annotation-tasks:
    post:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: create
    get:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: list
  /annotation-tasks/{task_uuid}:
    get:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: get
  /annotation-tasks/{task_uuid}/evaluators:
    put:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: set_evaluators
  /annotation-tasks/{task_uuid}/items:
    post:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: add_items
    put:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: update_items
  /annotation-tasks/{task_uuid}/evaluator-runs:
    post:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: create_evaluator_run
  /annotation-tasks/{task_uuid}/evaluator-runs/{job_uuid}:
    get:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: get_evaluator_run
  /annotation-tasks/{task_uuid}/agreement:
    get:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: get_agreement
  /annotation-tasks/{task_uuid}/summary:
    get:
      x-fern-sdk-group-name: annotation_tasks
      x-fern-sdk-method-name: get_summary
