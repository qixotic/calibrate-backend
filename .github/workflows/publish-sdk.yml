name: Publish Python SDK

# Publish the typed Python SDK (calibrate-sdk) to PyPI, generated by Fern
# from the app's PUBLIC OpenAPI spec (fetched by the ./.github/actions/
# fetch-public-spec composite action). Triggered by pushing an `sdk-v*` tag —
# a DEDICATED tag line, deliberately separate from the backend's own `v*` release
# tags (those drive deploy.yml on `release: published`), so an SDK publish never
# rides along with a backend deploy. The SDK version is the tag minus the
# `sdk-v` prefix (sdk-v0.1.0 -> 0.1.0). PyPI versions are immutable, so releasing
# the SDK = pushing a new `sdk-v*` tag. `workflow_dispatch` backfills by hand.
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "SDK version to publish (e.g. 0.1.0). Required for manual runs."
        required: true

# Never let two publishes for the same version race.
concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sdk:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      # Install deps, boot the app, and fetch its public spec into fern/openapi/.
      # Shared with validate-sdk.yml (one source of truth for the boot/env/fetch).
      - uses: ./.github/actions/fetch-public-spec
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}

      - name: Resolve SDK version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing calibrate-sdk version $VERSION"

      - name: Install Fern
        run: npm install -g fern-api

      # github-mode: this PUSHES the generated SDK to dalmia/calibrate-python-sdk
      # (and sets that repo up to publish). It does NOT publish to PyPI itself.
      - name: Generate SDK + sync to repo
        run: fern generate --group python-sdk --version "${{ steps.version.outputs.version }}" --log-level debug
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      # The SDK repo's own ci.yml publishes to PyPI, but only when a tag is pushed
      # THERE. So tag it automatically right after the sync — a single `sdk-v*` tag
      # on THIS repo then drives the whole release (generate -> push -> tag -> publish).
      # Needs SDK_REPO_TOKEN: a PAT with contents:write on dalmia/calibrate-python-sdk.
      # (The default GITHUB_TOKEN can't push to another repo, and — unlike a
      # GITHUB_TOKEN push — a PAT-created tag DOES trigger the SDK repo's workflow.)
      # The published version comes from the SDK repo's pyproject (set by --version
      # above); this tag name only triggers the run.
      - name: Tag SDK repo to trigger its PyPI publish
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          SDK_REPO="dalmia/calibrate-python-sdk"
          TAG="v${{ steps.version.outputs.version }}"
          SHA=$(gh api "repos/$SDK_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$SDK_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $SDK_REPO @ $SHA as $TAG — its ci.yml will publish to PyPI."
