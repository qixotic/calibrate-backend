name: Publish SDK and CLI

# Fetches the app's public OpenAPI spec once, then generates in parallel:
#   - calibrate-sdk (Python) via Fern → dalmia/calibrate-python-sdk
#   - calibrate CLI via Speakeasy → dalmia/calibrate-cli
# Setup: SETUP_SDK.md
#
# Trigger: push an sdk-v* tag, or workflow_dispatch with a version (e.g. 0.1.0).
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Client version to publish (e.g. 0.1.0). Required for manual runs."
        required: true

concurrency:
  group: publish-clients-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/fetch-public-spec
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}

      - name: Resolve client version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#sdk-v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No version resolved (not a tag push and no manual input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing calibrate-sdk (Fern) + Calibrate CLI (Speakeasy) version $VERSION"

      - name: Upload public OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: public-openapi
          path: openapi/openapi.json
          retention-days: 1

  publish-python-sdk:
    needs: prepare
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Download public OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: public-openapi
          path: openapi

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate Python SDK + sync to repo
        run: fern generate --group python-sdk --version "${{ needs.prepare.outputs.version }}" --log-level debug
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Tag SDK repo to trigger its PyPI publish
        env:
          GH_TOKEN: ${{ secrets.PUSH_TO_REPO_TOKEN }}
        run: |
          SDK_REPO="dalmia/calibrate-python-sdk"
          TAG="v${{ needs.prepare.outputs.version }}"
          SHA=$(gh api "repos/$SDK_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$SDK_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $SDK_REPO @ $SHA as $TAG — its ci.yml will publish to PyPI."

  publish-cli:
    needs: prepare
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Download public OpenAPI spec
        uses: actions/download-artifact@v4
        with:
          name: public-openapi
          path: openapi

      - name: Install Speakeasy CLI
        run: curl -fsSL https://go.speakeasy.com/cli-install.sh | sh

      - name: Generate Calibrate CLI + sync to repo
        env:
          SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
          PUSH_TO_REPO_TOKEN: ${{ secrets.PUSH_TO_REPO_TOKEN }}
        run: |
          speakeasy run -t calibrate-cli \
            --set-version "${{ needs.prepare.outputs.version }}" \
            --skip-testing -y
          chmod +x ./.github/scripts/patch-goreleaser-config.sh
          chmod +x ./.github/scripts/patch-cli-auth-commands.sh
          ./.github/scripts/patch-goreleaser-config.sh
          ./.github/scripts/patch-cli-auth-commands.sh
          ./.github/scripts/sync-client-repo.sh \
            dalmia/calibrate-cli \
            .speakeasy/out/cli \
            "chore(cli): release ${{ needs.prepare.outputs.version }}"

      - name: Tag CLI repo to trigger its release publish
        env:
          GH_TOKEN: ${{ secrets.PUSH_TO_REPO_TOKEN }}
        run: |
          CLI_REPO="dalmia/calibrate-cli"
          TAG="v${{ needs.prepare.outputs.version }}"
          SHA=$(gh api "repos/$CLI_REPO/git/ref/heads/main" --jq .object.sha)
          gh api "repos/$CLI_REPO/git/refs" -f ref="refs/tags/$TAG" -f sha="$SHA"
          echo "Tagged $CLI_REPO @ $SHA as $TAG — its ci.yml will publish the CLI."
