name: Auto-publish SDK and CLI

# After a successful production deploy, publishes clients when the public OpenAPI
# spec changed. Manual dispatch can force a publish or pin a version.
# Gated by Production secrets (SDK_AUTO_PUBLISH_ENABLED + PUSH_TO_REPO_TOKEN).
# Setup: SETUP_SDK.md
on:
  workflow_run:
    workflows: ["Deploy to Production"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Client version (e.g. 0.1.0). Leave empty to auto-bump patch."
        required: false
      force:
        description: "Publish even when the public OpenAPI spec is unchanged"
        type: boolean
        default: false

concurrency:
  group: auto-publish-sdk
  cancel-in-progress: false

jobs:
  gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      publish_enabled: ${{ steps.gate.outputs.publish_enabled }}
    steps:
      - uses: ./.github/actions/check-publish-gate
        id: gate
        with:
          sdk_auto_publish_enabled: ${{ secrets.SDK_AUTO_PUBLISH_ENABLED }}
          push_to_repo_token: ${{ secrets.PUSH_TO_REPO_TOKEN }}

  detect:
    needs: gate
    if: needs.gate.outputs.publish_enabled == 'true'
    runs-on: ubuntu-latest
    environment: Production
    outputs:
      should_publish: ${{ steps.plan.outputs.should_publish }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Resolve target commit
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 2

      - uses: ./.github/actions/fetch-public-spec
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}

      - name: Stage CI helper scripts
        run: |
          stage_file() {
            local path="$1" dest="$2"
            if [ -f "$path" ]; then
              cp "$path" "$dest"
            else
              git fetch origin main --depth=1
              git show "origin/main:${path}" > "$dest"
            fi
          }
          stage_file .github/scripts/fetch-public-openapi.sh /tmp/fetch-public-openapi.sh
          stage_file .github/scripts/normalize_openapi_hash.py /tmp/normalize_openapi_hash.py
          stage_file .github/scripts/next_sdk_version.py /tmp/next_sdk_version.py
          chmod +x /tmp/fetch-public-openapi.sh

      - name: Compute current release spec hash
        id: head_hash
        run: |
          HASH=$(python3 /tmp/normalize_openapi_hash.py openapi/openapi.json)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Compute previous release spec hash
        id: parent_hash_done
        env:
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
        run: |
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "missing_parent=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout --quiet HEAD~1
          uv sync --frozen
          /tmp/fetch-public-openapi.sh openapi/openapi-parent.json
          HASH=$(python3 /tmp/normalize_openapi_hash.py openapi/openapi-parent.json)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "missing_parent=false" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: plan
        env:
          GH_TOKEN: ${{ secrets.PUSH_TO_REPO_TOKEN }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force == 'true' }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
          HEAD_HASH: ${{ steps.head_hash.outputs.hash }}
          PARENT_HASH: ${{ steps.parent_hash_done.outputs.hash }}
          MISSING_PARENT: ${{ steps.parent_hash_done.outputs.missing_parent }}
        run: |
          if [ "$FORCE" = "true" ]; then
            CHANGED=true
          elif [ "$MISSING_PARENT" = "true" ]; then
            CHANGED=true
          elif [ "$HEAD_HASH" = "$PARENT_HASH" ]; then
            CHANGED=false
          else
            CHANGED=true
          fi

          if [ "$CHANGED" != "true" ]; then
            echo "Public OpenAPI spec unchanged; skipping client publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$(python3 /tmp/next_sdk_version.py)"
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Will publish SDK + CLI version $VERSION"

  publish:
    needs: detect
    if: needs.detect.outputs.should_publish == 'true'
    uses: ./.github/workflows/publish-sdk.yml
    with:
      version: ${{ needs.detect.outputs.version }}
    secrets: inherit
